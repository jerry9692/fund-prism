      canonical_name: fund_code
      data_type: str
      required: true
    - raw_name: "持有人户数"
      canonical_name: total_holders
      data_type: int
    - raw_name: "机构持有比例"
      canonical_name: institutional_pct
      data_type: float
      unit: "%"
    - raw_name: "个人持有比例"
      canonical_name: individual_pct
      data_type: float
      unit: "%"
    - raw_name: "内部持有比例"
      canonical_name: employee_pct
      data_type: float
      unit: "%"
    - raw_name: "总份额"
      canonical_name: total_shares
      data_type: float
      unit: 万份

