# ================================================================
fund_holder_structure:
  source: akshare.fund_hold_structure_em
  akshare_version: "1.18.64"
  underlying_source: 天天基金（东方财富）
  underlying_source_level: B
  call_signature: "ak.fund_hold_structure_em()"
  call_cost: "~8s"
  note: "⚠️ 无参函数，返回 N 条记录的 DataFrame，需用基金代码列筛选目标基金"
